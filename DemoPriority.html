<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priority Scheduling Demo</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}
.container {
    background: rgba(0,0,0,0.5);
    margin: 40px 0;
    padding: 30px 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 800px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
h1 { margin-bottom: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);}
table { margin:auto; border-collapse: collapse; width: 100%; margin-bottom:15px; }
th, td { border:1px solid #fff; padding:8px; text-align:center; }
th { background:#f1c40f; color:#1f4037; }
td input { width:60px; text-align:center; border:none; border-bottom:2px solid #fff; background:transparent; color:white; outline:none; }
button {
    padding: 10px 20px; margin:5px; border:none; border-radius:10px;
    font-weight:bold; cursor:pointer; transition: all 0.3s ease;
}
.add-remove { background:#f1c40f; color:#1f4037; }
.add-remove:hover { background:#fff; transform: scale(1.05);}
.next { background:#2ecc71; color:white; }
.next:hover { background:#27ae60; transform: scale(1.05);}
.back { background:#e74c3c; color:white; position:absolute; top:20px; left:20px;}
.back:hover { background:#c0392b; transform: scale(1.05);}
.gantt-bar { display:inline-block; height:30px; margin:2px; color:white; line-height:30px; border-radius:5px;}
@media(max-width:600px){ td input { width:50px;} button { padding:8px 16px; font-size:0.9em; } }
</style>
</head>
<body>

<button class="back" onclick="back()">← Quay lại</button>

<div class="container">
<h1>Priority Scheduling Demo</h1>

<table id="table">
<tr><th>Process</th><th>Burst</th><th>Arrival</th><th>Priority</th></tr>
<tr><td>P0</td><td><input type="number" min="0"></td><td><input type="number" min="0"></td><td><input type="number" min="1"></td></tr>
</table>

<button class="add-remove" onclick="addRow()">Add Row +</button>
<button class="add-remove" onclick="removeRow()">Remove Row</button>
<br>
<button class="next" onclick="runPriority()">Run Priority</button>

<div id="gantt"></div>
<div id="result"></div>
</div>

<script>
let count=1;
function addRow(){
    let table=document.getElementById('table');
    let row=table.insertRow();
    row.innerHTML=`<td>P${count}</td><td><input type="number" min="0"></td><td><input type="number" min="0"></td><td><input type="number" min="1"></td>`;
    count++;
}
function removeRow(){
    let table=document.getElementById('table');
    if(table.rows.length>2)table.deleteRow(-1), count--;
}
function runPriority(){
    let table=document.getElementById('table');
    let pro=[];
    for(let i=1;i<table.rows.length;i++){
        let pid=table.rows[i].cells[0].innerText;
        let b=parseInt(table.rows[i].cells[1].children[0].value);
        let a=parseInt(table.rows[i].cells[2].children[0].value);
        let pri=parseInt(table.rows[i].cells[3].children[0].value);
        if(isNaN(b)||isNaN(a)||isNaN(pri)){ alert("Nhập đầy đủ dữ liệu!"); return; }
        pro.push({pid,b,a,pri});
    }
    pro.sort((x,y)=>x.a-y.a); // sort by arrival
    let t=0, done=[], ready=[], gantt=[];
    while(done.length<pro.length){
        for(let p of pro) if(p.a<=t && !done.includes(p) && !ready.includes(p)) ready.push(p);
        if(ready.length==0){ t++; continue; }
        ready.sort((x,y)=>y.pri - x.pri); // higher priority first
        let cur=ready.shift();
        gantt.push({pid:cur.pid,start:t,end:t+cur.b});
        cur.start=t; cur.comp=t+cur.b; cur.turn=cur.comp-cur.a; cur.wait=cur.turn-cur.b;
        t+=cur.b; done.push(cur);
    }

    // Gantt chart
    let g=document.getElementById('gantt'); g.innerHTML="<h3>Gantt Chart</h3>";
    for(let g1 of gantt){
        let bar=document.createElement('div');
        bar.className='gantt-bar';
        bar.style.width=(g1.end-g1.start)*25+'px';
        bar.style.backgroundColor='#'+Math.floor(Math.random()*16777215).toString(16);
        bar.innerText=g1.pid;
        g.appendChild(bar);
    }

    // Result Table
    let r=document.getElementById('result');
    let html="<h3>Result Table</h3><table><tr><th>Process</th><th>Burst</th><th>Arrival</th><th>Priority</th><th>Comp</th><th>Turn</th><th>Wait</th></tr>";
    for(let p of done) html+=`<tr><td>${p.pid}</td><td>${p.b}</td><td>${p.a}</td><td>${p.pri}</td><td>${p.comp}</td><td>${p.turn}</td><td>${p.wait}</td></tr>`;
    html+="</table>"; r.innerHTML=html;
}
function back(){ window.location.href="Giaodien.html"; }
</script>

</body>
</html>
