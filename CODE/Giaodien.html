<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chọn thuật toán CPU Scheduling</title>
<style>
/* Nền toàn trang */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
}

/* Khung chính */
.container {
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 50px 40px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease forwards;
}

/* Tiêu đề */
h2 {
    font-size: 2em;
    margin-bottom: 30px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* Nút */
button {
    padding: 15px 35px;
    margin: 15px;
    border: none;
    border-radius: 10px;
    font-size: 1.2em;
    font-weight: bold;
    background: #f1c40f;
    color: #1f4037;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Hover nút */
button:hover {
    background: #fff;
    transform: scale(1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Nút quay lại */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
}

/* Animation fade in */
@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media(max-width: 600px){
    h2 { font-size: 1.5em; }
    button { font-size: 1em; padding: 12px 25px; }
}
</style>
</head>
<body>

<button class="back" onclick="back()">← Quay lại</button>

<div class="container">
    <h2>Chọn thuật toán để chạy</h2>
    <button onclick="goSJF()">Chạy SJF</button>
    <button onclick="goPriority()">Chạy Priority</button>
</div>

<script>
function goSJF(){ window.location.href = "DemoSJF.html"; }
function goPriority(){ window.location.href = "DemoPriority.html"; }
function back(){ window.location.href = "Trangchu.html"; }
</script>

</body>
</html>
