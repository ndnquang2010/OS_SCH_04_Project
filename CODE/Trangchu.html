<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang chủ CPU Scheduling</title>
<style>
/* Nền toàn trang */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    color: #fff;
}

/* Khung chính */
.container {
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 50px 40px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1.2s ease forwards;
}

/* Chủ đề */
h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* Mô tả */
p {
    font-size: 1.2em;
    margin-bottom: 40px;
}

/* Nút bắt đầu */
.btn-start {
    padding: 15px 40px;
    font-size: 1.2em;
    font-weight: bold;
    color: #1f4037;
    background: #f1c40f;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Hover nút */
.btn-start:hover {
    background: #fff;
    transform: scale(1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Animation fade in */
@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media(max-width: 600px){
    h1 { font-size: 2em; }
    p { font-size: 1em; }
    .btn-start { font-size: 1em; padding: 12px 30px; }
}
</style>
</head>
<body>
    <div class="container">
        <h1>CPU Scheduling Algorithm</h1>
        <p>Học cách sắp xếp tiến trình trong hệ điều hành một cách hiệu quả!</p>
        <button class="btn-start" onclick="start()">Bắt đầu</button>
    </div>

<script>
function start(){
    // Chuyển sang giao diện chọn thuật toán
    window.location.href = "Giaodien.html";
}
</script>
</body>
</html>
